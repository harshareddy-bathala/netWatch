name: NetWatch CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt mypy types-requests
      - name: mypy (non-strict)
        run: mypy --ignore-missing-imports --no-strict-optional config.py backend/ utils/ || true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          NETWATCH_ENV: testing
        run: |
          pytest tests/ -v --tb=short --co -q 2>/dev/null || true
          pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=database --cov=backend --cov=alerts --cov=packet_capture --cov-report=term-missing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 14

      - name: Upload coverage (ubuntu 3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t netwatch:${{ github.sha }} .

      - name: Smoke-test container
        run: |
          docker run -d --name nw -p 5000:5000 -e NETWATCH_ENV=testing netwatch:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:5000/health || (docker logs nw && exit 1)
          docker stop nw

  build:
    name: Build release artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Package source tarball
        run: |
          VERSION=$(cat VERSION)
          tar czf netwatch-${VERSION}.tar.gz \
            --exclude=__pycache__ --exclude='*.pyc' --exclude=.git \
            --exclude=venv --exclude=dist --exclude=build \
            --exclude='*.db' --exclude=logs \
            .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netwatch-release
          path: netwatch-*.tar.gz

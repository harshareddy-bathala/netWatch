<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWatch Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <span class="status-dot"></span> NetWatch
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="devices.html">Devices</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="alerts.html">Alerts</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
<div class="container-fluid mt-4">
 <div class="row mb-4">
           <div class="col-md-6 col-lg-3 mb-3">
                <div class="card metric-card">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Current Bandwidth</h6>
                        <h2 class="data-value" id="bandwidthValue">0</h2>
                        <small>MB/s</small>
                    </div>
                </div>
            </div>
      <div class="col-md-6 col-lg-3 mb-3">
                <div class="card metric-card">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Active Devices</h6>
                        <h2 class="data-value" id="devicesValue">0</h2>
                        <small>devices</small>
                    </div>
                </div>
            </div>
         <div class="col-md-6 col-lg-3 mb-3">
                <div class="card metric-card">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Packets/Second</h6>
                        <h2 class="data-value" id="packetsValue">0</h2>
                        <small>pps</small>
                    </div>
                </div>
            </div>
<div class="col-md-6 col-lg-3 mb-3">
                <div class="card metric-card">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-2 text-muted">Health Score</h6>
                        <h2 class="data-value" id="healthValue">0</h2>
                        <small id="healthStatus">Good</small>
                    </div>
                </div>
            </div>
        </div>
 <div class="row mb-4">
         
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-header">
                        <h5>Bandwidth History</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="bandwidthCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>
<div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-header">
                        <h5>Protocol Distribution</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="protocolCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
<div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Top Devices by Bandwidth</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>IP Address</th>
                                        <th>Hostname</th>
                                        <th>Bandwidth Used</th>
                                        <th>Last Seen</th>
                                    </tr>
                                </thead>
                                <tbody id="devicesTableBody">
                                    <tr>
                                        <td colspan="4" class="text-center">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<footer class="text-center mt-4 mb-3">
        <small class="text-muted">
            Last updated: <span id="lastUpdated">Never</span>
            <span class="ms-3">Auto-refresh: <span class="status-dot"></span></span>
        </small>
    </footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
     <script src="js/api.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

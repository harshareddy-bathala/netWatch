<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetWatch</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Design System CSS -->
  <link rel="stylesheet" href="css/reset.css?v=3.0.0" />
  <link rel="stylesheet" href="css/variables.css?v=3.0.0" />
  <link rel="stylesheet" href="css/layout.css?v=3.0.0" />
  <link rel="stylesheet" href="css/components.css?v=3.0.0" />
  <link rel="stylesheet" href="css/animations.css?v=3.0.0" />

  <!-- Chart.js (loaded before app module) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
          integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g"
          crossorigin="anonymous"></script>

  <!-- Application (ES Module) -->
  <script type="module" src="js/app.js?v=3.0.0"></script>

  <!-- Apply saved theme before first paint -->
  <script src="js/theme-init.js?v=3.0.0"></script>
</head>
<body>
  <noscript>
    <div class="noscript-message">
      <h1>JavaScript Required</h1>
      <p>NetWatch requires JavaScript to be enabled in your browser.</p>
    </div>
  </noscript>

  <!-- Mobile hamburger -->
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app">
    <!-- Sidebar (rendered by Sidebar.js) -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main area -->
    <main class="content">
      <header class="page-header">
        <h1 class="page-header__title" id="page-title">Dashboard</h1>
        <div class="page-header__actions">
          <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme" aria-label="Toggle theme">
            <svg class="theme-toggle__icon theme-toggle__sun" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
            <svg class="theme-toggle__icon theme-toggle__moon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <div class="page-header__status">
            <span class="status-dot" id="status-dot"></span>
            <span id="last-updated">--:--:--</span>
          </div>
        </div>
      </header>

      <div id="view-container" class="view-enter"></div>
    </main>
  </div>

  <!-- Toast container for notifications -->
  <div class="toast-container" id="toast-container"></div>
</body>
</html>
